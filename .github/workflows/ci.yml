name: ci

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  rust:
    name: rust ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      # Lint without `custom-protocol` so `tauri::generate_context!` takes the
      # dev path and skips the embedded-frontend existence check (the UI is
      # built and type-checked in the dedicated `ui` job).
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --no-default-features -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml --all-targets --no-default-features

  ui:
    name: ui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm typecheck

  sidecar:
    name: sidecar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --project sidecar
      - run: uv run --project sidecar pytest -q
